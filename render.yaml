services:
  - type: web
    name: review-analyzer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: review-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

  - type: worker
    name: review-analyzer-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m celery -A backend.tasks.celery_app.celery_app worker --loglevel=info --pool=threads
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: review-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: review-db
    plan: free

  - name: review-redis
    plan: free